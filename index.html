<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CristalOS - Web OS</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for macOS look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script type="module" src="script.js" defer></script>
</head>

<body>
    <!-- Premium Auth Window -->
    <div id="auth-overlay">
        <div id="auth-window" class="window">
            <div class="window-header">
                <div class="traffic-lights">
                    <div class="light gray"></div>
                    <div class="light gray"></div>
                    <div class="light gray"></div>
                </div>
                <div class="window-title">CristalOS Auth</div>
            </div>
            <div class="window-content auth-container">
                <div class="auth-brand">
                    <img src="https://img.icons8.com/fluency/10000/crystal.png" alt="CristalOS">
                    <h1>Bienvenue</h1>
                </div>

                <div id="login-form">
                    <input type="email" id="auth-email" placeholder="E-mail">
                    <input type="password" id="auth-password" placeholder="Mot de passe">
                    <button class="mac-btn-blue" id="btn-login">Se connecter</button>
                    <p class="auth-toggle">Pas encore de compte ? <span id="to-register">S'inscrire</span></p>
                </div>

                <div id="register-form" style="display: none;">
                    <input type="email" id="reg-email" placeholder="E-mail">
                    <input type="password" id="reg-password" placeholder="Nouveau mot de passe">
                    <button class="mac-btn-blue" id="btn-register">Créer un compte</button>
                    <p class="auth-toggle">Déjà un compte ? <span id="to-login">Se connecter</span></p>
                </div>

                <div id="auth-loader" style="display: none;">
                    <div class="spinner"></div>
                </div>

                <p id="auth-message"></p>
            </div>
        </div>
    </div>

    <div id="desktop-wrapper" style="display: none;">
        <!-- Top Menu Bar -->
        <header id="top-bar">
            <div class="left-section">
                <div class="menu-item system-logo-container">
                    <img src="https://img.icons8.com/fluency/10000/crystal.png" alt="CristalOS" id="system-logo">
                </div>
                <div class="menu-item active-app-name">Finder</div>
                <div class="menu-item">Fichier</div>
                <div class="menu-item">Édition</div>
                <div class="menu-item">Présentation</div>
                <div class="menu-item">Aller</div>
            </div>
            <div class="right-section">
                <div class="menu-item">WiFi</div>
                <div class="menu-item">Batterie</div>
                <div class="menu-item">Recherche</div>
                <div class="menu-item" id="top-bar-clock">00:00</div>
            </div>
        </header>

        <!-- Desktop Grid -->
        <main id="desktop">
            <!-- Icons will be generated here -->
        </main>

        <!-- Application Windows Container -->
        <div id="window-container"></div>

        <!-- Dock -->
        <footer id="dock-container">
            <div id="dock">
                <div class="dock-item" data-app="finder" title="Finder">
                    <img src="https://img.icons8.com/fluency/200/mac-os.png" alt="Finder">
                </div>
                <div class="dock-item" data-app="safari" title="Safari">
                    <img src="https://img.icons8.com/fluency/200/safari.png" alt="Safari">
                </div>
                <div class="dock-item" data-app="appstore" title="App Store">
                    <img src="https://img.icons8.com/fluency/200/apple-app-store.png" alt="App Store">
                </div>
                <div class="dock-item" data-app="settings" title="Paramètres">
                    <img src="https://img.icons8.com/fluency/200/settings.png" alt="Settings">
                </div>
                <div class="dock-item" data-app="terminal" title="Terminal">
                    <img src="https://img.icons8.com/fluency/200/terminal.png" alt="Terminal">
                </div>
                <div class="dock-item" data-app="textedit" title="TextEdit">
                    <img src="https://img.icons8.com/fluency/200/edit-file.png" alt="TextEdit">
                </div>
                <!-- Trash/Bin -->
                <div class="dock-divider"></div>
                <div class="dock-item" data-app="trash" title="Corbeille">
                    <img src="https://img.icons8.com/fluency/200/trash.png" alt="Trash">
                </div>
            </div>
        </footer>
    </div>
</body>

</html>
